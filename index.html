<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>指摘写真生成</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="指摘写真生成">
<meta name="theme-color" content="#1b3a6b">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap');
:root{
  --bg:#f0f2f6;--white:#fff;--border:#c8cdd8;--border2:#8a90a8;
  --navy:#1b3a6b;--navy2:#24508a;--nlight:#e6edf8;
  --green:#0a7c5c;--glight:#e6f4f0;
  --red:#c0392b;--warn:#d97706;--orange:#ea580c;
  --text:#1a1d27;--text2:#5c6480;--text3:#9098b0;
  --font:'Noto Sans JP',sans-serif;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;max-width:520px;margin:0 auto}

/* TOPBAR */
.topbar{background:var(--navy);padding:11px 14px 0;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.tb1{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.app-ttl{color:#fff;font-size:16px;font-weight:900;letter-spacing:.5px}
.app-ttl em{color:#7eb8ff;font-style:normal}
.tb-org{color:rgba(255,255,255,.45);font-size:10px}
.tabs{display:flex;gap:2px}
.tab{flex:1;padding:8px 3px;border:none;border-radius:7px 7px 0 0;font-size:11px;font-weight:700;
  cursor:pointer;font-family:var(--font);background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);transition:all .15s}
.tab.on{background:var(--bg);color:var(--navy)}
.tab .n{background:var(--navy2);color:#fff;font-size:9px;border-radius:99px;padding:1px 5px;margin-left:2px}
.tab.on .n{background:var(--navy)}

/* PANELS */
.pnl{display:none;padding-bottom:90px}.pnl.on{display:block}

/* HOME */
.home{padding:20px 14px}
.hero{text-align:center;padding:24px 0 20px}
.hero .ico{font-size:48px;margin-bottom:10px}
.hero h1{font-size:19px;font-weight:900;color:var(--navy);margin-bottom:3px}
.hero p{font-size:12px;color:var(--text2)}
.hbtns{display:flex;flex-direction:column;gap:9px}
.hbtn{display:flex;align-items:center;gap:13px;padding:16px 14px;border-radius:var(--r);
  border:2px solid var(--border);background:var(--white);cursor:pointer;font-family:var(--font);width:100%;text-align:left;transition:all .15s}
.hbtn:active{transform:scale(.98)}
.hbtn.pri{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 4px 14px rgba(27,58,107,.3)}
.hbtn .bi{font-size:24px;flex-shrink:0}
.hbtn .bt h3{font-size:13px;font-weight:700;margin-bottom:2px}
.hbtn .bt p{font-size:11px;opacity:.65}
.hbtn:not(.pri) .bt h3{color:var(--text)}
.hbtn:not(.pri) .bt p{color:var(--text2)}
.sec-lbl{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.arc-item{display:flex;align-items:center;gap:9px;padding:11px 13px;background:var(--white);
  border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:6px;cursor:pointer;transition:all .15s}
.arc-item:active{background:var(--nlight)}
.arc-info{flex:1;min-width:0}
.arc-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arc-meta{font-size:11px;color:var(--text2);margin-top:1px}
.arc-del{width:30px;height:30px;border:none;background:#fdecea;color:var(--red);border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.arc-empty{text-align:center;padding:20px;color:var(--text3);font-size:12px}

/* SETUP */
.setup{padding:12px}
.scard{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.stitle{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fld label{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:3px;display:block}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;
  color:var(--text);font-family:var(--font);font-size:13px;padding:8px 10px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--navy)}
.inp[type=date]::-webkit-calendar-picker-indicator{opacity:.5}
.chip-wrap{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:6px 12px;border-radius:99px;border:1.5px solid var(--border);font-size:12px;font-weight:700;
  cursor:pointer;background:var(--white);color:var(--text2);transition:all .15s;font-family:var(--font)}
.chip.on{border-color:var(--navy);background:var(--navy);color:#fff}

/* Inspector picker */
.insp-area{display:flex;flex-direction:column;gap:8px}
.insp-row{display:flex;align-items:center;gap:7px}
.insp-lbl{font-size:11px;color:var(--text2);font-weight:700;white-space:nowrap;min-width:40px}
.insp-chips{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.insp-chip{padding:5px 11px;border-radius:99px;border:1.5px solid var(--border);font-size:12px;font-weight:700;
  cursor:pointer;background:var(--white);color:var(--text2);transition:all .15s;font-family:var(--font)}
.insp-chip.on{border-color:var(--navy2);background:var(--navy2);color:#fff}
.insp-custom-row{display:flex;gap:6px;margin-top:2px}
.insp-custom-inp{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;
  color:var(--text);font-family:var(--font);font-size:12px;padding:7px 9px;outline:none}
.insp-custom-inp:focus{border-color:var(--navy)}
.insp-add-btn{padding:7px 12px;border-radius:7px;border:none;background:var(--navy);color:#fff;
  font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}

/* SHEET */
.sheet-wrap{padding:8px}
.sheet{background:var(--white);border:2px solid var(--border2);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.sh-hdr{background:var(--navy);color:#fff;display:flex;align-items:stretch;flex-wrap:wrap}
.sh-c{padding:7px 9px;border-right:1px solid rgba(255,255,255,.2);display:flex;align-items:center;font-size:11px;font-weight:700}
.sh-c:last-child{border-right:none}
.sh-c input{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-family:var(--font);font-size:11px;padding:3px 6px;border-radius:4px;outline:none}
.sh-c input::placeholder{color:rgba(255,255,255,.4)}
.sh-c input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.6}
.type-bar{background:var(--nlight);border-bottom:1.5px solid var(--border);padding:6px 10px;display:flex;align-items:center;gap:6px}
.type-bar .tl{font-size:10px;font-weight:700;color:var(--navy)}
.type-bar .tv{font-size:12px;font-weight:900;color:var(--navy)}
.type-bar .tk{font-size:10px;color:var(--text2);margin-left:auto}

/* SHEET ROW (1 指摘 = 1 row) */
.srow{border-bottom:2px solid var(--border2)}
.srow:last-child{border-bottom:none}
.srow-hdrs{display:grid;grid-template-columns:1fr 1fr;background:var(--bg);border-bottom:1px solid var(--border)}
.srow-hdr{padding:4px 8px;font-size:9px;font-weight:900;letter-spacing:.8px}
.srow-hdr.L{color:var(--navy);border-right:1.5px solid var(--border2)}
.srow-hdr.R{color:var(--green)}
/* 4 pairs of left+right cells */
.cell-pair{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.cell-pair:last-child{border-bottom:none}
.pcell{position:relative;aspect-ratio:3/2;background:#eef1f7;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
.pcell.R{background:#f0f8f4;border-left:1.5px solid var(--border2)}
.pcell.has-img{background:#000}
.pcell img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.pcell-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(27,58,107,.75);
  color:#fff;font-size:9px;font-weight:700;text-align:center;padding:2px;z-index:1}
.pcell-lbl.green{background:rgba(10,124,92,.8)}
.pcell-rm{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;
  background:rgba(0,0,0,.6);border:none;color:#fff;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;z-index:2}
.pcell-num{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;
  background:var(--navy);color:#fff;font-size:10px;font-weight:900;
  display:flex;align-items:center;justify-content:center;z-index:2}
.pcell-empty-ico{font-size:24px;opacity:.22;margin-bottom:3px}
.pcell-empty-txt{font-size:9px;color:var(--text3)}
.rtxt-cell{padding:7px;font-size:11px;color:var(--text);line-height:1.55;
  display:flex;flex-direction:column;justify-content:flex-start;
  aspect-ratio:3/2;cursor:pointer;position:relative;background:#f0f8f4;
  border-left:1.5px solid var(--border2);border-bottom:1px solid var(--border);overflow:hidden}

/* Sheet row footer */
.srow-foot{display:flex;gap:5px;padding:5px 7px;background:var(--bg);border-top:1px solid var(--border)}
.srow-del{flex:1;padding:7px;border-radius:6px;border:none;font-size:11px;font-weight:700;
  cursor:pointer;font-family:var(--font);background:#fdecea;color:var(--red)}

.add-sheet-btn{margin:8px;width:calc(100% - 16px);padding:11px;border-radius:8px;
  border:2px dashed var(--border2);background:none;color:var(--navy);font-size:13px;font-weight:700;
  cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px}

/* TEMPLATE MANAGER */
.tmgr-item{display:flex;align-items:flex-start;gap:7px;padding:9px 11px;
  background:var(--white);border:1.5px solid var(--border);border-radius:7px;margin-bottom:5px}
.tmgr-txt{flex:1;font-size:12px;line-height:1.5}
.tmgr-acts{display:flex;gap:3px;flex-shrink:0}
.ico-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);
  background:var(--bg);color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ico-btn.d{background:#fdecea;color:var(--red);border-color:#f5b8b5}
.add-tmpl-btn{width:100%;padding:9px;border-radius:7px;border:1.5px dashed var(--border2);
  background:none;color:var(--navy);font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px}

/* OVERLAYS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.on{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:520px;
  padding:14px 13px 30px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:88vh;overflow-y:auto}
.ov.on .modal{transform:translateY(0)}
.mhandle{width:34px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 12px}
.mttl{font-size:14px;font-weight:900;margin-bottom:3px}
.msub{font-size:11px;color:var(--text2);margin-bottom:12px}

/* Template picker modal */
.tmpl-scroll{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.topt{padding:10px 12px;border-radius:7px;border:1.5px solid var(--border);
  background:var(--bg);font-size:12px;line-height:1.55;cursor:pointer;
  font-family:var(--font);text-align:left;width:100%;color:var(--text);transition:all .15s}
.topt.on{background:var(--nlight);border-color:var(--navy);color:var(--navy);font-weight:700}
.free-ta{width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:7px;font-family:var(--font);font-size:12px;padding:8px 10px;
  resize:none;outline:none;min-height:68px;color:var(--text);margin-bottom:9px}
.free-ta:focus{border-color:var(--navy)}
.mrow{display:flex;gap:7px}
.mbtn{flex:1;padding:11px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.mbtn.ok{background:var(--navy);color:#fff}
.mbtn.cancel{background:var(--bg);color:var(--text2);border:1.5px solid var(--border)}

/* Photo preview modal (order selection) */
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.prev-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:2px solid var(--border);cursor:pointer;background:#eee}
.prev-thumb img{width:100%;height:100%;object-fit:cover}
.prev-num{position:absolute;top:4px;left:4px;width:22px;height:22px;border-radius:50%;
  background:var(--navy);color:#fff;font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.prev-num.empty{background:rgba(0,0,0,.35)}
.prev-sel-badge{position:absolute;inset:0;background:rgba(27,58,107,.35);display:flex;align-items:center;justify-content:center}

/* Single photo source button */
.src-single-btn{width:100%;padding:20px 14px;border-radius:12px;border:2px dashed var(--border2);
  background:var(--bg);font-size:14px;font-weight:700;cursor:pointer;text-align:center;
  font-family:var(--font);position:relative;color:var(--text);display:block}
.src-single-btn:active{background:var(--nlight);border-color:var(--navy)}
.src-single-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.src-note{font-size:10px;color:var(--text2);text-align:center;line-height:1.7}

/* Right choice modal */
.choice-grid{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.choice-btn{padding:14px;border-radius:9px;border:1.5px solid var(--border);
  background:var(--bg);font-size:13px;font-weight:700;cursor:pointer;
  font-family:var(--font);text-align:left;display:flex;align-items:center;gap:11px;color:var(--text)}
.choice-btn:active{background:var(--nlight);border-color:var(--navy)}
.choice-btn .ci{font-size:20px}

/* Text input modal */
.txt-ta{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;
  font-family:var(--font);font-size:12px;padding:8px 10px;resize:none;outline:none;
  min-height:72px;color:var(--text);margin-bottom:9px}
.txt-ta:focus{border-color:var(--navy)}

/* BOTTOM BAR */
.botbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;padding:9px 11px;
  background:rgba(255,255,255,.97);backdrop-filter:blur(10px);
  border-top:1.5px solid var(--border);display:flex;gap:7px;z-index:100}
.bbtn{flex:1;padding:12px 6px;border-radius:9px;border:none;font-size:13px;font-weight:700;
  cursor:pointer;font-family:var(--font)}
.bbtn:active{transform:scale(.98)}
.bbtn.pri{background:var(--navy);color:#fff;box-shadow:0 3px 10px rgba(27,58,107,.3)}
.bbtn.sec{background:var(--bg);color:var(--text2);border:1.5px solid var(--border)}
.bbtn.grn{background:var(--green);color:#fff;box-shadow:0 3px 10px rgba(10,124,92,.3)}
.bbtn.org{background:var(--orange);color:#fff;box-shadow:0 3px 10px rgba(234,88,12,.3)}

/* GAS/Wizard styles removed */
/* Toast */
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);
  background:rgba(26,29,39,.93);color:#fff;font-size:12px;font-weight:600;
  padding:8px 17px;border-radius:99px;opacity:0;pointer-events:none;
  transition:opacity .25s;white-space:nowrap;z-index:999}
.toast.on{opacity:1}.toast.ok{background:var(--green)}.toast.warn{background:var(--warn)}

/* Spinner */
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 印刷用スタイル（PDF出力） */
@media print {
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
  html,body{max-width:100% !important;width:100% !important;background:#fff !important;padding:0 !important;margin:0 !important;}
  .topbar,.tabs,.botbar,.srow-foot,.add-sheet-btn,
  .ov,.wizard-ov,.toast,#pnl-home,#pnl-setup,#pnl-tmpl,
  .ph-remove,.pcell-rm{display:none !important;}
  .pnl{display:block !important;padding:0 !important;}
  #pnl-sheet{display:block !important;}
  .sheet-wrap{padding:0 !important;margin:0 !important;}
  .sheet{border:none !important;box-shadow:none !important;border-radius:0 !important;width:100% !important;}
  .srow{page-break-inside:avoid;break-inside:avoid;margin-bottom:0 !important;}
  .cell-pair{page-break-inside:avoid;break-inside:avoid;}
  .pcell{aspect-ratio:auto !important;height:56mm !important;background:#fff !important;}
  .pcell.R{background:#f8fcfa !important;}
  .pcell img{width:100% !important;height:100% !important;object-fit:contain !important;background:#fff !important;}
  .pcell.has-img{background:#fff !important;}
  .rtxt-cell{height:56mm !important;background:#f8fcfa !important;}
  .pcell-lbl{display:none !important;}
  .pcell-empty-ico{display:none !important;}
  .pcell-empty-txt{display:none !important;}
  .type-bar .tk{display:none !important;}
  a[href]:after{content:none !important;}
  @page{
    size:A4 portrait;
    margin:8mm 8mm 8mm 8mm;
  }
}
</style>
  <!-- exceljs: ブラウザ用Excelライブラリ -->
  <script src="./exceljs.min.js" defer></script>
</head>
<body>

<div class="topbar">
  <div class="tb1">
    <div class="app-ttl">指摘<em>写真</em>生成</div>
    <div class="tb-org">住まいと土地の総合相談センター</div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-home">🏠 ホーム</button>
    <button class="tab" id="tab-sheet">📋 入力 <span class="n" id="ecnt">0</span></button>
    <button class="tab" id="tab-tmpl">🗂 テンプレ</button>
  </div>
</div>

<!-- HOME -->
<div class="pnl on" id="pnl-home">
  <div class="home">
    <div class="hero"><div class="ico">🏗</div><h1>現場検査記録アプリ</h1><p>住まいと土地の総合相談センター</p></div>
    <div class="hbtns">
      <button class="hbtn pri" id="btn-new"><span class="bi">📝</span><div class="bt"><h3>新規作成</h3><p>物件名・検査日・担当者・種別を設定</p></div></button>
      <button class="hbtn" id="btn-load"><span class="bi">📂</span><div class="bt"><h3>過去の物件を読み込む</h3><p>保存済みの記録を呼び出す</p></div></button>
      <button class="hbtn" id="btn-install" style="display:none;border-color:var(--green)" onclick="installApp()"><span class="bi">📲</span><div class="bt"><h3>ホーム画面に追加</h3><p>アプリとしてインストール</p></div></button>
    </div>
    <div id="arc-sec" style="display:none;margin-top:18px">
      <div class="sec-lbl">保存済み物件</div>
      <div id="arc-list"></div>
    </div>
  </div>
</div>

<!-- SETUP -->
<div class="pnl" id="pnl-setup">
  <div class="setup">
    <div class="scard">
      <div class="stitle">📋 基本情報</div>
      <div class="row2" style="margin-bottom:9px">
        <div class="fld"><label>物件名</label><input class="inp" id="s-owner" type="text" placeholder="例）山田邸"></div>
        <div class="fld"><label>検査日</label><input class="inp" id="s-date" type="date"></div>
      </div>
    </div>
    <div class="scard">
      <div class="stitle">👤 担当者（最大2名）</div>
      <div class="insp-area">
        <div class="insp-row">
          <div class="insp-lbl">担当1</div>
          <div class="insp-chips" id="insp1-chips"></div>
        </div>
        <div class="insp-row">
          <div class="insp-lbl">担当2</div>
          <div class="insp-chips" id="insp2-chips"></div>

  document.getElementById('rtxt-cancel').addEventListener('click', ()=> closeOv('ov-rtxt'));

  document.getElementById('botbar').addEventListener('click', e=>{

// ─── PHOTO FLOW ──────────────────────────────────────
function openSrc(rid, side, idx){
  _photoCtx={rid, side, idx};
  openOv('ov-src');
}

// 写真圧縮（長辺1000px・品質70%）
function compressImage(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        const MAX = 1000, Q = 0.70;  // 1000px・70%品質
        let w = img.width, h = img.height;
        if(Math.max(w,h) > MAX){
          if(w >= h){ h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', Q));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function handleFileInput(input){
  closeOv('ov-src');
  const files=Array.from(input.files); if(!files.length) return;
  input.value='';
  showToast('📷 写真を処理中…');
  if(files.length===1){
    compressImage(files[0]).then(src=>{
      placePhotos([src]);
    });
    return;
  }
  // 複数選択：全圧縮してからプレビュー表示
  Promise.all(files.map(f=>compressImage(f))).then(srcs=>{
    _previewFiles = files;
    _previewOrder = files.map((_,i)=>i);
    _previewSrcs = srcs; // 圧縮済みデータを保持
    renderPreviewGrid(srcs);
  });
}

function showPreview(){
  const grid=document.getElementById('prev-grid'); grid.innerHTML='';
  const loaded=[];
  let count=0;
  _previewFiles.forEach((f,fi)=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      loaded[fi]=ev.target.result;
      count++;
      if(count===_previewFiles.length) renderPreviewGrid(loaded);
    };
    reader.readAsDataURL(f);
  });
}

function renderPreviewGrid(srcs){
  const grid=document.getElementById('prev-grid'); grid.innerHTML='';

  const {side, idx} = _photoCtx;
  const startFlat = idx * 2 + (side==='right' ? 1 : 0);
  const cellNames = ['左①','右①','左②','右②','左③','右③','左④','右④'];

  srcs.forEach((src, fi)=>{
    const orderPos = _previewOrder.indexOf(fi);
    const thumb = document.createElement('div'); thumb.className='prev-thumb';
    const img = document.createElement('img'); img.src=src; img.alt='';
    thumb.appendChild(img);

    const num = document.createElement('div');
    num.className = 'prev-num';
    num.textContent = orderPos + 1;
    thumb.appendChild(num);

    // 行き先セル名（上書き込みで表示）
    const targetFlat = (startFlat + orderPos) % 8;
    const cellLbl = document.createElement('div');
    cellLbl.style.cssText = 'position:absolute;bottom:0;left:0;right:0;background:rgba(27,58,107,.8);color:#fff;font-size:9px;font-weight:700;text-align:center;padding:2px;';
    cellLbl.textContent = '→ ' + cellNames[targetFlat];
    thumb.appendChild(cellLbl);

    thumb.addEventListener('click', ()=> swapOrder(fi, srcs));
    grid.appendChild(thumb);
  });
  openOv('ov-preview');
}

// タップした写真を「1つ前」の順番と入れ替え（先頭なら末尾へ）
function swapOrder(fi, srcs){
  const pos = _previewOrder.indexOf(fi);
  if(pos <= 0){
    // 先頭 → 末尾へ移動
    _previewOrder.splice(pos, 1);
    _previewOrder.push(fi);
  } else {
    // 前の要素と入れ替え
    const tmp = _previewOrder[pos - 1];
    _previewOrder[pos - 1] = _previewOrder[pos];
    _previewOrder[pos] = tmp;
  }
  renderPreviewGrid(srcs);
}

function applyPhotos(){
  closeOv('ov-preview');
  // 圧縮済みデータを順番通りに並べてそのまま使用
  const srcs = _previewOrder.map(i => _previewSrcs[i]);
  if(!srcs.length) return;
  placePhotos(srcs);
}

// セル配置順：タップしたセルから上書きで順番に埋める
// 全8セル: [L0,R0,L1,R1,L2,R2,L3,R3]、溢れたら自動でシートを追加
function placePhotos(srcs){
  const {rid, side, idx} = _photoCtx;
  let row = getRow(rid); if(!row) return;

  // フラット配列（左右交互）全8スロット
  const flat = [];
  for(let i=0;i<4;i++){
    flat.push({side:'left',  idx:i});
    flat.push({side:'right', idx:i});
  }

  // タップしたセルの位置
  const startFlat = idx * 2 + (side==='right' ? 1 : 0);

  srcs.forEach((src, i) => {
    const pos = startFlat + i;
    if(pos < 8){
      // 現在のシートに配置
      const target = flat[pos];
      if(target.side === 'left') row.LP[target.idx] = src;
      else                        row.RP[target.idx] = src;
    } else {
      // 8枚を超えたら新しいシートを自動追加して左①から配置
      const rowIdx = session.rows.indexOf(row);
      const nextRowIdx = rowIdx + 1;
      // 次のシートが存在しなければ追加
      if(nextRowIdx >= session.rows.length){
        session.rows.push(newRow());
      }
      row = session.rows[nextRowIdx];
      const overPos = pos - 8;
      const target = flat[overPos % 8];
      if(target.side === 'left') row.LP[target.idx] = src;
      else                        row.RP[target.idx] = src;
      // 次のシートが溢れた場合さらに追加（再帰的に対応）
      if(overPos >= 8){
        // ここでは最大2シート追加まで対応（実用上十分）
        if(rowIdx + 2 >= session.rows.length) session.rows.push(newRow());
        const row2 = session.rows[rowIdx + 2];
        const target2 = flat[(pos - 16) % 8];
        if(target2.side === 'left') row2.LP[target2.idx] = src;
        else                         row2.RP[target2.idx] = src;
      }
    }
  });
  if(srcs.length > 8 - startFlat){
    showToast('📋 写真が多いため自動でシートを追加しました', 'ok');
  }
  renderSheet();
}

function removePhoto(rid, side, idx){
  const row=getRow(rid); if(!row) return;
  (side==='left'?row.LP:row.RP)[idx]=null; renderSheet();
}

// ─── RIGHT CELL ──────────────────────────────────────
function openRight(rid, idx){
  _rightCtx={rid,idx};
  closeOv('ov-choice');
  // Check if already has content
  const row=getRow(rid);
  if(row&&(row.RP[idx]||row.RT[idx])){
    // Re-open the appropriate editor
    if(row.RP[idx]){ _photoCtx={rid,side:'right',idx}; openOv('ov-src'); }
    else openRtxtModal(rid,idx);
    return;
  }
  openOv('ov-choice');
}

function choicePhoto(){
  closeOv('ov-choice');
  _photoCtx={rid:_rightCtx.rid, side:'right', idx:_rightCtx.idx};
  openOv('ov-src');
}

function choiceCmt(){
  closeOv('ov-choice');
  openRtxtModal(_rightCtx.rid, _rightCtx.idx);
}

function openRtxtModal(rid, idx){
  _rtxtTarget={rid,idx};
  const row=getRow(rid);
  const type=session?session.type:'';
  document.getElementById('rtxt-sub').textContent='検査種別：'+type;
  document.getElementById('rtxt-ta').value = row ? (row.RT[idx]||'') : '';
  const list=templates[type]||[];
  const wrap=document.getElementById('rtxt-tmpl-list'); wrap.innerHTML='';
  list.forEach((t,i)=>{
    const b=document.createElement('button'); b.className='topt'; b.textContent=(i+1)+'. '+t;
    b.addEventListener('click',()=>{
      document.querySelectorAll('#rtxt-tmpl-list .topt').forEach(o=>o.classList.remove('on'));
      b.classList.add('on'); document.getElementById('rtxt-ta').value=t;
    });
    wrap.appendChild(b);
  });
  if(!list.length){
    const d=document.createElement('div'); d.style.cssText='font-size:12px;color:var(--text2);padding:6px';
    d.textContent='テンプレートがありません。「テンプレ」タブから追加できます。';
    wrap.appendChild(d);
  }
  openOv('ov-rtxt');
}

function applyRtxt(){
  const val=document.getElementById('rtxt-ta').value.trim();
  const row=getRow(_rtxtTarget.rid); if(row) row.RT[_rtxtTarget.idx]=val;
  closeOv('ov-rtxt'); renderSheet();
}

function clearRtxt(rid, idx){
  const row=getRow(rid); if(!row) return; row.RT[idx]=''; renderSheet();
}

// ─── TEMPLATE MANAGER ────────────────────────────────
function buildTmgrSel(){
  const sel=document.getElementById('tmgr-sel'); sel.innerHTML='<option value="">— 選択 —</option>';
  TYPES.forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; sel.appendChild(o); });
}
function renderTmgrBody(){
  const type=document.getElementById('tmgr-sel').value;
  const wrap=document.getElementById('tmgr-body');
  if(!type){ wrap.innerHTML='<div style="padding:18px;text-align:center;color:var(--text2);font-size:12px">種別を選択してください</div>'; return; }
  wrap.innerHTML='';
  const card=document.createElement('div'); card.className='scard';
  const title=document.createElement('div'); title.className='stitle'; title.textContent='📌 '+type+' のテンプレート';
  card.appendChild(title);
  const list=templates[type]||[];
  list.forEach((t,i)=>{
    const item=document.createElement('div'); item.className='tmgr-item';
    const txt=document.createElement('div'); txt.className='tmgr-txt'; txt.textContent=(i+1)+'. '+t;
    const acts=document.createElement('div'); acts.className='tmgr-acts';
    const edit=document.createElement('button'); edit.className='ico-btn'; edit.textContent='✏️';
    const del=document.createElement('button'); del.className='ico-btn d'; del.textContent='✕';
    edit.addEventListener('click',()=>editTmpl(type,i));
    del.addEventListener('click',()=>delTmpl(type,i));
    acts.appendChild(edit); acts.appendChild(del);
    item.appendChild(txt); item.appendChild(acts); card.appendChild(item);
  });
  const addBtn=document.createElement('button'); addBtn.className='add-tmpl-btn'; addBtn.textContent='＋ テンプレートを追加';
  addBtn.addEventListener('click',()=>addTmpl(type));
  card.appendChild(addBtn); wrap.appendChild(card);
}
function addTmpl(type){
  const txt=prompt('【'+type+'】新しいテンプレートを入力:'); if(!txt) return;
  if(!templates[type]) templates[type]=[];
  templates[type].push(txt); saveTmpl(); renderTmgrBody(); showToast('✅ 追加しました','ok');
}
function editTmpl(type,i){
  const txt=prompt('テンプレートを編集:',templates[type][i]); if(txt===null) return;
  templates[type][i]=txt; saveTmpl(); renderTmgrBody(); showToast('✅ 更新しました','ok');
}
function delTmpl(type,i){
  if(!confirm('削除しますか？')) return;
  templates[type].splice(i,1); saveTmpl(); renderTmgrBody(); showToast('🗑 削除しました');
}

// ─── ARCHIVE ─────────────────────────────────────────
function saveToArc(){
  if(!session) return;
  session.savedAt=new Date().toISOString();
  const snap=JSON.parse(JSON.stringify(session));
  const idx=archives.findIndex(a=>a.id===session.id);
  if(idx>=0) archives[idx]=snap; else archives.push(snap);
  saveArc(); showToast('💾 保存しました','ok');
}

// ─── PDF印刷（ブラウザ印刷機能） ──────────────────────
function printAsPdf(){
  if(!session||!session.rows.length){ showToast('⚠️ データがありません'); return; }

  // ファイル名を提案（ブラウザのデフォルトタイトルを変更）
  const d = (session.date||'').replace(/-/g,'');
  const owner = session.owner||'物件';
  const type = session.type||'';
  const suggestedName = `【是正完了】${d}　${owner}　${type}`;
  const originalTitle = document.title;
  document.title = suggestedName;

  goTab('sheet');
  setTimeout(()=>{
    window.print();
    // 印刷後にタイトルを戻す
    setTimeout(()=>{ document.title = originalTitle; }, 2000);
  }, 500);
}
// ─── Excel生成（exceljs ブラウザローカル生成）────────────
async function generateExcel(){
  if(!session||!session.rows.length){ showToast('⚠️ データがありません'); return; }

  document.querySelectorAll('.bbtn').forEach(b=> b.disabled=true);
  showToast('📊 Excel生成中…','warn');

  try {
    if(typeof ExcelJS === 'undefined'){
      await loadScript('./exceljs.min.js');
    }

    const wb = new ExcelJS.Workbook();
    wb.creator = '現場検査記録アプリ';
    wb.created = new Date();

    // レイアウト定数
    const COL_W       = 38;   // 列幅（文字単位）≒約13.5cm
    const ROW_H_HDR   = 28;   // ヘッダー行高さ（pt）
    const ROW_H_SUB   = 20;
    const ROW_H_PHOTO = 190;  // 写真行高さ（pt）★拡大
    const PHOTO_ROWS  = 4;
    const TOTAL_ROWS  = PHOTO_ROWS + 2; // ヘッダー2行 + 写真4行

    const inspStr = [session.insp1, session.insp2].filter(Boolean).join(' / ');
    const dateStr = formatDateJP(session.date);
    const ownerStr = session.owner || '物件';
    const typeStr  = session.type  || '';

    for(let idx = 0; idx < session.rows.length; idx++){
      const row = session.rows[idx];
      const ws = wb.addWorksheet('No' + (idx + 1));

      // 列幅設定
      ws.getColumn(1).width = COL_W;
      ws.getColumn(2).width = COL_W;

      // ── 印刷設定（余白最小・A4縦・2列に収める）──
      ws.pageSetup = {
        paperSize: 9,          // A4
        orientation: 'portrait',
        fitToPage: true,
        fitToWidth: 1,
        fitToHeight: 0,
        printArea: 'A1:B' + TOTAL_ROWS,
        showGridLines: false
      };
      ws.pageMargins = {
        left: 0.25,   right:  0.25,
        top:  0.25,   bottom: 0.25,
        header: 0.1,  footer: 0.1
      };

      // ── 行1：ヘッダー ──
      ws.getRow(1).height = ROW_H_HDR;
      ws.mergeCells('A1:B1');
      const hCell = ws.getCell('A1');
      hCell.value = ownerStr + ' 様邸　' + dateStr + '　' + typeStr + '　担当：' + inspStr;
      hCell.fill   = { type:'pattern', pattern:'solid', fgColor:{argb:'FF1b3a6b'} };
      hCell.font   = { color:{argb:'FFFFFFFF'}, bold:true, size:11, name:'メイリオ' };
      hCell.alignment = { horizontal:'left', vertical:'middle' };
      hCell.border = {
        top:{style:'medium',color:{argb:'FF1b3a6b'}},
        bottom:{style:'medium',color:{argb:'FF1b3a6b'}},
        left:{style:'medium',color:{argb:'FF1b3a6b'}},
        right:{style:'medium',color:{argb:'FF1b3a6b'}}
      };

      // ── 行2：サブヘッダー ──
      ws.getRow(2).height = ROW_H_SUB;
      const s2L = ws.getCell('A2');
      s2L.value = '指摘事項 No.' + (idx + 1);
      s2L.fill  = { type:'pattern', pattern:'solid', fgColor:{argb:'FFe6edf8'} };
      s2L.font  = { bold:true, size:10, color:{argb:'FF1b3a6b'}, name:'メイリオ' };
      s2L.alignment = { horizontal:'left', vertical:'middle' };
      const s2R = ws.getCell('B2');
      s2R.value = '↓↓是正写真はこの面に貼付けて提出してください。';
      s2R.fill  = { type:'pattern', pattern:'solid', fgColor:{argb:'FFe6f4f0'} };
      s2R.font  = { bold:true, size:10, color:{argb:'FF0a7c5c'}, name:'メイリオ' };
      s2R.alignment = { horizontal:'left', vertical:'middle' };

      // ── 行3〜6：写真行 ──
      for(let pi = 0; pi < PHOTO_ROWS; pi++){
        const rowNum = pi + 3;
        ws.getRow(rowNum).height = ROW_H_PHOTO;

        // 左セル（指摘写真）
        const lCell = ws.getCell(rowNum, 1);
        lCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFf0f3f8'} };
        lCell.alignment = { horizontal:'center', vertical:'middle' };
        const lPhoto = row.LP && row.LP[pi];
        if(lPhoto && lPhoto.startsWith('data:')){
          try {
            const imgId = addImageToWorkbook(wb, lPhoto);
            ws.addImage(imgId, {
              tl: { col: 0, row: rowNum - 1, nativeRowOff: 50000 },
              br: { col: 1, row: rowNum,     nativeRowOff: -50000 },
              editAs: 'oneCell'
            });
          } catch(e){ lCell.value = '（写真エラー）'; }
        }

        // 右セル（是正写真欄 or テキスト）
        const rCell = ws.getCell(rowNum, 2);
        rCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFf0f8f4'} };
        const rPhoto = row.RP && row.RP[pi];
        const rText  = row.RT && row.RT[pi];
        if(rPhoto && rPhoto.startsWith('data:')){
          try {
            const imgId2 = addImageToWorkbook(wb, rPhoto);
            ws.addImage(imgId2, {
              tl: { col: 1, row: rowNum - 1, nativeRowOff: 50000 },
              br: { col: 2, row: rowNum,     nativeRowOff: -50000 },
              editAs: 'oneCell'
            });
          } catch(e){ rCell.value = '（写真エラー）'; }
        } else if(rText){
          // ─ テキスト整形：全文字表示・バランス改行 ─
          rCell.value   = formatCellText(rText);
          rCell.font    = { size: 10, name:'メイリオ' };
          rCell.alignment = { wrapText:true, horizontal:'left', vertical:'top',
                              indent: 1 };
        }

        // セル罫線
        const thin = { style:'thin', color:{argb:'FF8a90a8'} };
        lCell.border = { top:thin, bottom:thin, left:thin, right:thin };
        rCell.border = { top:thin, bottom:thin, left:thin, right:thin };
      }

      // 外枠太罫線
      const med = { style:'medium', color:{argb:'FF1b3a6b'} };
      for(let r = 1; r <= TOTAL_ROWS; r++){
        const cL = ws.getCell(r, 1);
        const cR = ws.getCell(r, 2);
        cL.border = Object.assign({}, cL.border||{}, { left:med });
        cR.border = Object.assign({}, cR.border||{}, { right:med });
        if(r === 1){
          cL.border = Object.assign({}, cL.border, { top:med });
          cR.border = Object.assign({}, cR.border, { top:med });
        }
        if(r === TOTAL_ROWS){
          cL.border = Object.assign({}, cL.border, { bottom:med });
          cR.border = Object.assign({}, cR.border, { bottom:med });
        }
      }
    }

    // xlsx をblobとしてDL
    const buf  = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf], {
      type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
    });
    const d     = (session.date||'').replace(/-/g,'');
    const fname = d + '_' + ownerStr + '様_' + typeStr + '_検査記録.xlsx';
    downloadBlob(blob, fname);

    saveToArc();
    showToast('✅ Excelをダウンロードしました','ok');

  } catch(err){
    console.error('Excel生成エラー:', err);
    showToast('❌ Excel生成に失敗しました: ' + err.message);
  } finally {
    document.querySelectorAll('.bbtn').forEach(b=> b.disabled=false);
  }
}

// テキスト整形：改行コードを正規化し、全文字が表示されるよう調整
function formatCellText(text){
  if(!text) return '';
  // \n を実際の改行に変換
  return text.replace(/\\n/g, '\n').replace(/\n/g, '\n');
}

function addImageToWorkbook(wb, dataUrl){
  const parts = dataUrl.split(',');
  const mime  = (parts[0].match(/:(.*?);/) || [])[1] || 'image/jpeg';
  const ext   = mime === 'image/png' ? 'png' : 'jpeg';
  return wb.addImage({ base64: parts[1], extension: ext });
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1000);
}

function loadScript(src){
  return new Promise((resolve, reject)=>{
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function formatDateJP(s){
  if(!s) return '';
  const d = new Date(s);
  const reiwa = d.getFullYear() - 2018;
  return '令和' + reiwa + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
}

  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast on '+cls;
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('on'),2800);
}
